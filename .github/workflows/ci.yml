name: CI

on:
  push:
    branches:
      - dev
      - feature-*
  pull_request:
    branches:
      - dev
      - main

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Verify frontend files exist
        run: |
          echo "Checking frontend directory..."
          ls -la frontend

      - name: CI passed
        run: echo "No backend yet - CI passed successfully!"
